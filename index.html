<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="big-box">
        <input class="input-city" type="text" placeholder="Digite o nome da cidade" value="Paris" >

        <button id="button" class="button" onclick="voiceDetection()">
            <img src="img/microfone.svg" alt="Microfone">
        </button>

        <button id="pesquisar" class="button" onclick="buttonClick()">
            <img src="img/lupa.svg" alt="buscar">
        </button>

        <div class="hr-box" id="hr-box">
            <p class="dia"></p>
        </div>

        <div class="medium-box">

        </div>

        <div class="clock" id="clock">
            <div class="clock-img">
                <img src="img/clock.png" alt="clock">
            </div>

            <div class="hours">
                <span class="hr" id="hr"></span>
            </div>
            <div class="minutes">
                <span class="min" id="min"></span>
            </div>
            <div class="seconds">
                <span class="sec" id="sec"></span>

            </div>
                
            </div>

        </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
